<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Voxel Mining</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; }
    canvas { display: block; }

    #ui { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }

    #crosshair {
      position: absolute; top: 50%; left: 50%;
      width: 18px; height: 18px;
      transform: translate(-50%, -50%);
    }
    #crosshair::before, #crosshair::after {
      content: ''; position: absolute; background: rgba(255,255,255,0.85);
    }
    #crosshair::before { width: 2px; height: 100%; left: 50%; transform: translateX(-50%); }
    #crosshair::after  { width: 100%; height: 2px; top:  50%; transform: translateY(-50%); }

    #overlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.65);
      color: #fff; font: 22px/1.8 monospace; text-align: center;
      pointer-events: auto; cursor: pointer;
    }
    #overlay small { font-size: 14px; color: #ccc; }

    #hud {
      position: absolute; top: 12px; left: 14px;
      color: #fff; font: 13px monospace;
      text-shadow: 1px 1px 3px #000;
      line-height: 1.6;
    }

    #command-input {
      position: absolute; bottom: 14px; left: 14px;
      background: rgba(0, 0, 0, 0.8);
      border: 1px solid #888;
      color: #fff;
      font: 13px monospace;
      padding: 6px 8px;
      min-width: 200px;
      display: none;
      pointer-events: auto;
    }
    #command-input:focus {
      outline: none;
      border-color: #0f0;
    }

    #command-feedback {
      position: absolute; bottom: 40px; left: 14px;
      color: #0f0;
      font: 13px monospace;
      text-shadow: 1px 1px 3px #000;
      pointer-events: none;
      transition: opacity 0.3s;
      opacity: 0;
    }
  </style>
</head>
<body>
  <div id="ui">
    <div id="crosshair"></div>
    <div id="overlay">
      Click to Play
      <small>WASD — move &nbsp;|&nbsp; Mouse — look &nbsp;|&nbsp; LMB — mine &nbsp;|&nbsp; Space — jump</small>
      <small>Gamepad: L-stick move &nbsp;|&nbsp; R-stick look &nbsp;|&nbsp; RT mine</small>
    </div>
    <div id="hud"></div>
    <div id="command-feedback"></div>
    <input type="text" id="command-input" />
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.165.0/build/three.module.js",
      "three/examples/jsm/loaders/GLTFLoader.js": "https://unpkg.com/three@0.165.0/examples/jsm/loaders/GLTFLoader.js"
    }
  }
  </script>
  <script type="module" src="scripts/main.js"></script>
</body>
</html>
